spring.application.name=uums

# ============================================================
# Database Configuration  (update credentials as needed)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/uums_db
spring.datasource.username=postgres
spring.datasource.password=buburine
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================================
# Flyway Migrations
# ============================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=W4SAC-REG-Utility-Billing-System-SuperSecret-Key-2025-MustBe256BitsLong!
app.jwt.expiration=86400000

